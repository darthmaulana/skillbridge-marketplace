<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>SkillBridge - Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f1f5f9; color: #0f172a; font: 16px system-ui, sans-serif; }
      main { width: min(320px, calc(100% - 48px)); padding: 32px; text-align: center; background: white; border-radius: 24px; box-shadow: 0 16px 50px #0f172a18; }
      .mark { width: 64px; height: 64px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 18px; color: white; background: #2563eb; font-weight: 800; font-size: 24px; }
      p { color: #64748b; line-height: 1.6; }
      button { border: 0; border-radius: 14px; padding: 12px 20px; color: white; background: #2563eb; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">S</div>
      <h1>You are offline</h1>
      <p>Reconnect to refresh jobs, messages, and account updates.</p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
